<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF3 Interview Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <!-- PENTING: Ganti URL di bawah ini dengan URL Web App dari Google Apps Script Anda -->
    <script>
        const GOOGLE_SCRIPT_URL = "MASUKKAN_URL_WEB_APP_ANDA_DISINI";

        const AVAILABLE_SLOTS = [
            { id: 'd1-s1', date: 'July 24, 2026', time: '10:00 AM - 10:30 AM' },
            { id: 'd1-s2', date: 'July 24, 2026', time: '11:00 AM - 11:30 AM' },
            { id: 'd1-s3', date: 'July 24, 2026', time: '02:00 PM - 02:30 PM' },
            { id: 'd2-s1', date: 'July 25, 2026', time: '09:00 AM - 09:30 AM' },
            { id: 'd2-s2', date: 'July 25, 2026', time: '10:30 AM - 11:00 AM' },
            { id: 'd2-s3', date: 'July 25, 2026', time: '03:30 PM - 04:00 PM' },
            { id: 'd3-s1', date: 'July 26, 2026', time: '11:00 AM - 11:30 AM' },
        ];
    </script>

    <div id="app">
        <!-- Konten akan diisi oleh JavaScript -->
    </div>

    <script>
        let currentPage = 'landing';
        let isSubmitting = false;
        let formData = { name: '', brand: '', slotId: '' };

        function render() {
            const app = document.getElementById('app');
            if (currentPage === 'landing') {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center px-6 text-center fade-in">
                        <div class="mb-8 p-4 border-2 border-red-600 inline-block">
                            <h2 class="text-xl font-bold tracking-widest text-red-600 uppercase">JF3 2026</h2>
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black mb-6 uppercase tracking-tighter">
                            Media Interview <br/>
                            <span class="text-red-600">Availability</span>
                        </h1>
                        <p class="text-gray-400 max-w-lg mb-10 text-lg font-light">
                            Welcome, Designers. Please secure your time slot for the exclusive media interview session.
                        </p>
                        <button onclick="navigateTo('form')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full transition-all flex items-center gap-2 group shadow-lg shadow-red-600/20 mx-auto">
                            Book Your Session <i data-lucide="arrow-right"></i>
                        </button>
                    </div>
                `;
            } else if (currentPage === 'form') {
                app.innerHTML = `
                    <div class="min-h-screen bg-white text-black py-16 px-6 fade-in">
                        <div class="max-w-xl mx-auto">
                            <button onclick="navigateTo('landing')" class="text-gray-400 hover:text-black mb-8 flex items-center gap-1">
                                <i data-lucide="chevron-left"></i> Back to home
                            </button>
                            <h2 class="text-3xl font-bold mb-2">Reservation Form</h2>
                            <p class="text-gray-500 mb-8">Please fill in your details to secure the interview slot.</p>

                            <form onsubmit="handleBooking(event)" class="space-y-8">
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-2 text-gray-400">
                                        <i data-lucide="user" class="w-4 h-4 text-red-600"></i> Full Name
                                    </label>
                                    <input required type="text" id="name" placeholder="Your professional name" 
                                        class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none transition-colors"
                                        oninput="updateData('name', this.value)" value="${formData.name}">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-2 text-gray-400">
                                        <i data-lucide="briefcase" class="w-4 h-4 text-red-600"></i> Brand Name
                                    </label>
                                    <input required type="text" id="brand" placeholder="e.g. LUXE COUTURE" 
                                        class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none transition-colors"
                                        oninput="updateData('brand', this.value)" value="${formData.brand}">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-2 text-gray-400">
                                        <i data-lucide="calendar" class="w-4 h-4 text-red-600"></i> Schedule Availability
                                    </label>
                                    <select required id="slotId" 
                                        class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none bg-white transition-colors"
                                        onchange="updateData('slotId', this.value)">
                                        <option value="">Choose a date & time...</option>
                                        ${AVAILABLE_SLOTS.map(slot => `
                                            <option value="${slot.id}" ${formData.slotId === slot.id ? 'selected' : ''}>
                                                ${slot.date} | ${slot.time}
                                            </option>
                                        `).join('')}
                                    </select>
                                </div>
                                <button type="submit" ${isSubmitting ? 'disabled' : ''} 
                                    class="w-full bg-black hover:bg-gray-900 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 transition-all disabled:opacity-50">
                                    ${isSubmitting ? 'Processing...' : 'Confirm Booking'}
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            } else if (currentPage === 'success') {
                const slot = AVAILABLE_SLOTS.find(s => s.id === formData.slotId);
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center bg-white text-black px-6 text-center fade-in">
                        <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-6">
                            <i data-lucide="check-circle" class="w-10 h-10"></i>
                        </div>
                        <h1 class="text-3xl font-bold mb-2 uppercase tracking-tight">Booking Successful</h1>
                        <p class="text-gray-500 mb-8 max-w-sm">
                            Thank you, ${formData.name}. Your session for <span class="font-bold text-black">${formData.brand}</span> has been confirmed.
                        </p>
                        <div class="bg-gray-50 p-6 rounded-2xl w-full max-w-sm mb-10 text-left space-y-3 border border-gray-100 shadow-sm">
                            <div class="flex items-center gap-3 text-sm font-semibold text-gray-700">
                                <i data-lucide="calendar" class="w-4 h-4 text-red-600"></i> ${slot?.date}
                            </div>
                            <div class="flex items-center gap-3 text-sm font-semibold text-gray-700">
                                <i data-lucide="clock" class="w-4 h-4 text-red-600"></i> ${slot?.time}
                            </div>
                        </div>
                        <div class="flex flex-col gap-4 w-full max-w-sm">
                            <a href="https://jf3.co.id" target="_blank" class="bg-black text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors">
                                Track JF3 Schedule <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>
                            <button onclick="location.reload()" class="text-gray-400 text-sm hover:text-black transition-colors">
                                Make another booking
                            </button>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function navigateTo(page) {
            currentPage = page;
            render();
        }

        function updateData(key, value) {
            formData[key] = value;
        }

        async function handleBooking(e) {
            e.preventDefault();
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) {
                alert("Error: URL Google Script belum dipasang di kode.");
                return;
            }

            isSubmitting = true;
            render();

            const slot = AVAILABLE_SLOTS.find(s => s.id === formData.slotId);
            const data = {
                name: formData.name,
                brand: formData.brand,
                date: slot.date,
                time: slot.time,
                timestamp: new Date().toLocaleString()
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                currentPage = 'success';
            } catch (err) {
                console.error(err);
                alert("Submission failed. Please check your connection.");
            } finally {
                isSubmitting = false;
                render();
            }
        }

        // Jalankan render pertama kali
        render();
    </script>
</body>
</html>
