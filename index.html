<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF3 Interview Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <script>
        /**
         * PENTING: Ganti teks di bawah ini dengan URL Web App BARU yang Anda dapatkan setelah New Deployment.
         */
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCQyu9sdQebH85oIJOVQtfvghMRtg6w7mu4jSv6Yoy0uG_UtWPpeB-6JdwBLpEUh2T/exec";

        const AVAILABLE_SLOTS = [
            { id: 'd1-s1', date: 'July 24, 2026', time: '10:00 AM - 10:30 AM' },
            { id: 'd1-s2', date: 'July 24, 2026', time: '11:00 AM - 11:30 AM' },
            { id: 'd1-s3', date: 'July 24, 2026', time: '02:00 PM - 02:30 PM' },
            { id: 'd2-s1', date: 'July 25, 2026', time: '09:00 AM - 09:30 AM' },
            { id: 'd2-s2', date: 'July 25, 2026', time: '10:30 AM - 11:00 AM' },
            { id: 'd2-s3', date: 'July 25, 2026', time: '03:30 PM - 04:00 PM' },
            { id: 'd3-s1', date: 'July 26, 2026', time: '11:00 AM - 11:30 AM' },
        ];

        let bookedSlots = []; 
    </script>

    <div id="app"></div>

    <script>
        let currentPage = 'landing';
        let isSubmitting = false;
        let isLoadingSlots = false;
        let formData = { name: '', brand: '', slotId: '' };

        async function fetchBookedSlots() {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return;
            isLoadingSlots = true;
            render();
            try {
                // Tambahkan parameter ?t=RANDOM agar Google tidak memberikan data cache lama
                const cacheBuster = `?t=${new Date().getTime()}`;
                const response = await fetch(GOOGLE_SCRIPT_URL + cacheBuster);
                
                if (response.ok) {
                    const data = await response.json();
                    // Normalisasi data agar tidak ada spasi yang mengganggu saat pencocokan
                    bookedSlots = Array.isArray(data) ? data.map(s => s.trim()) : [];
                    console.log("Jadwal terisi:", bookedSlots);
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data:", err);
            } finally {
                isLoadingSlots = false;
                render();
            }
        }

        function render() {
            const app = document.getElementById('app');
            if (currentPage === 'landing') {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center px-6 text-center fade-in">
                        <div class="mb-8 p-4 border-2 border-red-600 inline-block">
                            <h2 class="text-xl font-bold tracking-widest text-red-600 uppercase">JF3 2026</h2>
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black mb-6 uppercase tracking-tighter">
                            Media Interview <br/>
                            <span class="text-red-600">Availability</span>
                        </h1>
                        <button onclick="goToForm()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full transition-all flex items-center gap-2 mx-auto shadow-lg shadow-red-600/20">
                            Book Your Session <i data-lucide="arrow-right"></i>
                        </button>
                    </div>
                `;
            } else if (currentPage === 'form') {
                app.innerHTML = `
                    <div class="min-h-screen bg-white text-black py-16 px-6 fade-in text-left">
                        <div class="max-w-xl mx-auto">
                            <button onclick="navigateTo('landing')" class="text-gray-400 hover:text-black mb-8 flex items-center gap-1 transition-colors">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to home
                            </button>
                            <h2 class="text-3xl font-bold mb-8">Reservation Form</h2>
                            
                            ${isLoadingSlots ? `
                                <div class="flex items-center gap-2 text-red-600 font-medium mb-6 bg-red-50 p-3 rounded-lg animate-pulse">
                                    <i data-lucide="loader-2" class="animate-spin"></i> Syncing availability with database...
                                </div>
                            ` : ''}

                            <form onsubmit="handleBooking(event)" class="space-y-8">
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-gray-400">Full Name</label>
                                    <input required type="text" oninput="updateData('name', this.value)" value="${formData.name}" class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-gray-400">Brand Name</label>
                                    <input required type="text" oninput="updateData('brand', this.value)" value="${formData.brand}" class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-gray-400">Schedule Availability</label>
                                    <select required id="slot-select" onchange="updateData('slotId', this.value)" class="w-full border-b-2 border-gray-100 p-3 focus:border-red-600 outline-none bg-white cursor-pointer">
                                        <option value="">Choose a date & time...</option>
                                        ${AVAILABLE_SLOTS.map(slot => {
                                            const slotString = `${slot.date}|${slot.time}`.trim();
                                            const isBooked = bookedSlots.includes(slotString);
                                            return `<option value="${slot.id}" ${isBooked ? 'disabled class="bg-gray-200 text-gray-400 font-italic"' : ''} ${formData.slotId === slot.id ? 'selected' : ''}>
                                                ${slot.date} | ${slot.time} ${isBooked ? '— [TAKEN]' : ''}
                                            </option>`;
                                        }).join('')}
                                    </select>
                                    <p class="text-[10px] mt-2 text-gray-400 italic">* Protected slots are already reserved and cannot be selected.</p>
                                </div>
                                <button type="submit" ${isSubmitting || isLoadingSlots ? 'disabled' : ''} class="w-full bg-black text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 disabled:opacity-50">
                                    ${isSubmitting ? '<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i> Processing Reservation...' : 'Confirm Booking'}
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            } else if (currentPage === 'success') {
                const slot = AVAILABLE_SLOTS.find(s => s.id === formData.slotId);
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center bg-white text-black px-6 text-center fade-in">
                        <i data-lucide="check-circle" class="w-16 h-16 text-green-500 mb-6"></i>
                        <h1 class="text-3xl font-bold mb-2 uppercase">Booking Successful</h1>
                        <p class="text-gray-500 mb-8 font-bold">${formData.brand} - ${formData.name}</p>
                        <div class="bg-gray-50 p-6 rounded-2xl w-full max-w-sm mb-10 text-left border border-gray-100">
                            <div class="flex items-center gap-3 text-sm mb-2"><i data-lucide="calendar" class="text-red-600"></i> ${slot?.date}</div>
                            <div class="flex items-center gap-3 text-sm"><i data-lucide="clock" class="text-red-600"></i> ${slot?.time}</div>
                        </div>
                        <button onclick="location.reload()" class="text-red-600 font-bold hover:underline">Make another booking</button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        async function goToForm() {
            navigateTo('form');
            await fetchBookedSlots();
        }

        function navigateTo(page) { currentPage = page; render(); }
        function updateData(key, value) { formData[key] = value; }

        async function handleBooking(e) {
            e.preventDefault();
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return;
            
            isSubmitting = true; render();
            const slot = AVAILABLE_SLOTS.find(s => s.id === formData.slotId);
            const data = { 
                name: formData.name, 
                brand: formData.brand, 
                date: slot.date, 
                time: slot.time, 
                timestamp: new Date().toLocaleString() 
            };

            try {
                // Kirim data ke Google Sheets
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                // Beri waktu sebentar agar Google Sheets selesai menulis sebelum sukses
                setTimeout(() => {
                    currentPage = 'success';
                    render();
                }, 500);

            } catch (err) {
                alert("Gagal mengirim data. Silakan coba lagi.");
            } finally { isSubmitting = false; render(); }
        }
        render();
    </script>
</body>
</html>
